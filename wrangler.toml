name = "permissionrechack"
compatibility_date = "2026-07-22"
main = "./src/worker.js"
keep_vars = true

[secrets]
required = [ "SUPABASE_SERVICE_ROLE_KEY" ]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [ "/", "/index.html", "/bootstrap.js", "/api/*" ]
